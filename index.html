<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marg'ilon turizm va madaniy meros texnikumi — Onlayn qabul jarayoni</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1F3A5F;
  --ink-deep:#152A44;
  --pomegranate:#B23A2E;
  --pomegranate-deep:#8C2C22;
  --ochre:#D9A441;
  --ochre-deep:#B8842C;
  --teal:#3E7C6B;
  --cream:#F6F1E4;
  --paper:#FCFAF3;
  --charcoal:#2B2420;
  --muted:#6E6455;
  --line:rgba(31,58,95,0.16);
  --success-bg:#E7F1EA;
  --success-tx:#2C6B4A;
  --warn-bg:#FBF0DC;
  --warn-tx:#8A5B12;
  --danger-bg:#F8E4E1;
  --danger-tx:#8C2C22;
  --new-bg:#E5EBF3;
  --new-tx:#1F3A5F;
  --radius:10px;
  --shadow:0 2px 14px rgba(31,58,95,0.08);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  font-family:'Manrope',sans-serif;
  background:var(--cream);
  color:var(--charcoal);
  line-height:1.55;
}
h1,h2,h3,.display{font-family:'Fraunces',serif;font-weight:600;letter-spacing:-0.01em;}
img{max-width:100%;display:block;}
button{font-family:inherit;cursor:pointer;}
a{color:inherit;}
.wrap{max-width:1120px;margin:0 auto;padding:0 24px;}

/* ikat pattern strip */
.ikat-strip{width:100%;height:14px;display:block;}
.ikat-strip.tall{height:22px;}

/* header */
.site-header{position:sticky;top:0;z-index:40;background:var(--paper);border-bottom:1px solid var(--line);}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;max-width:1120px;margin:0 auto;gap:16px;}
.brand{display:flex;align-items:center;gap:12px;cursor:pointer;}
.brand-mark{width:44px;height:44px;border-radius:8px;background:#fff;border:1px solid var(--line);flex-shrink:0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.brand-mark img{width:100%;height:100%;object-fit:contain;padding:3px;}
.brand-text .t1{font-family:'Fraunces',serif;font-weight:600;font-size:14.5px;color:var(--ink);line-height:1.25;max-width:260px;}
.brand-text .t2{font-size:11.5px;color:var(--muted);}
.nav-links{display:flex;align-items:center;gap:28px;}
.nav-links a{font-size:14px;font-weight:600;color:var(--charcoal);text-decoration:none;}
.nav-links a:hover{color:var(--pomegranate);}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 20px;border-radius:var(--radius);border:1.5px solid var(--ink);
  background:transparent;color:var(--ink);font-weight:700;font-size:14px;
  white-space:nowrap;transition:all .15s ease;
}
.btn:hover{background:var(--ink);color:#fff;}
.btn-primary{background:var(--pomegranate);border-color:var(--pomegranate);color:#fff;}
.btn-primary:hover{background:var(--pomegranate-deep);border-color:var(--pomegranate-deep);}
.btn-gold{background:var(--ochre);border-color:var(--ochre);color:var(--ink-deep);}
.btn-gold:hover{background:var(--ochre-deep);border-color:var(--ochre-deep);}
.btn-ghost{border-color:var(--line);color:var(--charcoal);}
.btn-ghost:hover{background:var(--ink);border-color:var(--ink);color:#fff;}
.btn-sm{padding:8px 14px;font-size:13px;}
.btn-block{width:100%;}
.btn[disabled]{opacity:0.55;cursor:not-allowed;}
.btn[disabled]:hover{background:inherit;color:inherit;}

/* hero */
.hero{background:var(--ink);position:relative;overflow:hidden;padding:64px 0 56px;}
.hero-inner{max-width:1120px;margin:0 auto;padding:0 24px;position:relative;z-index:2;}
.eyebrow{display:inline-flex;align-items:center;gap:8px;background:rgba(217,164,65,0.16);color:var(--ochre);font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:7px 14px;border-radius:999px;margin-bottom:22px;}
.hero h1{color:#fff;font-size:44px;line-height:1.12;max-width:680px;margin:0 0 18px;}
.hero p.lead{color:rgba(255,255,255,0.78);font-size:17px;max-width:560px;margin:0 0 30px;}
.hero-actions{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:40px;}
.hero-stats{display:flex;gap:0;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,0.16);padding-top:24px;}
.hero-stat{padding-right:36px;margin-right:36px;border-right:1px solid rgba(255,255,255,0.16);}
.hero-stat:last-child{border-right:none;}
.hero-stat .num{font-family:'Fraunces',serif;font-size:26px;color:var(--ochre);font-weight:600;}
.hero-stat .lbl{font-size:12.5px;color:rgba(255,255,255,0.65);}

/* sections */
section.block{padding:56px 0;}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:28px;flex-wrap:wrap;}
.section-head h2{font-size:28px;margin:0 0 6px;color:var(--ink-deep);}
.section-head p{margin:0;color:var(--muted);font-size:14.5px;max-width:560px;}
.group-label{display:flex;align-items:center;gap:12px;margin:36px 0 18px;}
.group-label span{font-size:13px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:var(--pomegranate);white-space:nowrap;}
.group-label .rule{flex:1;height:1px;background:var(--line);}
.group-label:first-child{margin-top:0;}

.dir-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;}
.dir-card{
  background:var(--paper);border:1px solid var(--line);border-radius:12px;
  padding:22px 22px 20px;position:relative;overflow:hidden;
  border-image:linear-gradient(180deg,var(--ochre),var(--pomegranate) 55%,var(--teal)) 1 / 0 0 0 5px / 0 stretch;
  box-shadow:var(--shadow);
  display:flex;flex-direction:column;gap:14px;
  transition:transform .15s ease;
}
.dir-card:hover{transform:translateY(-2px);}
.dir-icon{width:44px;height:44px;border-radius:9px;background:var(--cream);display:flex;align-items:center;justify-content:center;color:var(--ink);flex-shrink:0;}
.dir-icon svg{width:24px;height:24px;}
.dir-card h3{font-size:18px;margin:0;color:var(--ink-deep);line-height:1.3;}
.dir-tags{display:flex;gap:6px;flex-wrap:wrap;}
.tag{font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:999px;background:var(--new-bg);color:var(--new-tx);letter-spacing:0.02em;}
.tag.dual{background:var(--warn-bg);color:var(--warn-tx);}
.dir-card .spacer{flex:1;}

/* how it works */
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.step{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:22px;}
.step .n{font-family:'Fraunces',serif;font-size:30px;color:var(--ochre-deep);font-weight:600;line-height:1;margin-bottom:10px;}
.step h4{margin:0 0 6px;font-size:16px;color:var(--ink-deep);}
.step p{margin:0;font-size:13.5px;color:var(--muted);}

/* status check box */
.status-box{background:var(--ink);border-radius:14px;padding:32px;color:#fff;display:flex;gap:28px;align-items:center;flex-wrap:wrap;}
.status-box .txt{flex:1;min-width:240px;}
.status-box h3{color:#fff;margin:0 0 6px;font-size:20px;}
.status-box p{margin:0;color:rgba(255,255,255,0.72);font-size:13.5px;}
.status-form{display:flex;gap:10px;flex-wrap:wrap;flex:1;min-width:260px;}
.status-form input{flex:1;min-width:160px;}
.status-result{margin-top:16px;padding:14px 16px;border-radius:10px;background:rgba(255,255,255,0.08);width:100%;font-size:13.5px;}

/* news */
.news-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;}
.news-card{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:20px;}
.news-card .date{font-size:12px;color:var(--pomegranate);font-weight:700;text-transform:uppercase;letter-spacing:0.03em;margin-bottom:8px;}
.news-card h4{margin:0 0 8px;font-size:16px;color:var(--ink-deep);}
.news-card p{margin:0;font-size:13.5px;color:var(--muted);}
.empty{padding:32px;text-align:center;color:var(--muted);font-size:14px;border:1px dashed var(--line);border-radius:12px;}

/* footer */
footer{background:var(--ink-deep);color:rgba(255,255,255,0.7);padding:40px 0 28px;margin-top:20px;}
footer .wrap{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;}
footer h5{color:#fff;font-size:14px;margin:0 0 10px;font-family:'Manrope';font-weight:700;}
footer p, footer a{font-size:13px;color:rgba(255,255,255,0.62);text-decoration:none;}
footer .col{min-width:200px;}
.foot-bottom{border-top:1px solid rgba(255,255,255,0.12);margin-top:28px;padding-top:18px;font-size:12px;color:rgba(255,255,255,0.45);}

/* form */
.form-shell{max-width:720px;margin:0 auto;}
.form-card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:32px;box-shadow:var(--shadow);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:13.5px;font-weight:700;color:var(--ink-deep);margin-bottom:7px;}
.field .hint{font-size:12px;color:var(--muted);font-weight:400;margin-top:5px;}
input[type=text],input[type=tel],input[type=date],input[type=password],select,textarea{
  width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:8px;
  font-family:inherit;font-size:14px;color:var(--charcoal);background:#fff;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ink);}
textarea{resize:vertical;min-height:90px;}
.upload-box{border:1.5px dashed var(--line);border-radius:10px;padding:18px;text-align:center;background:#fff;position:relative;cursor:pointer;}
.upload-box:hover{border-color:var(--ink);}
.upload-box input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.upload-box .up-icon{color:var(--muted);margin-bottom:6px;}
.upload-box .up-text{font-size:13px;color:var(--muted);}
.upload-preview{margin-top:12px;display:flex;align-items:center;gap:12px;}
.upload-preview img{width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid var(--line);}
.upload-preview .fname{font-size:12.5px;color:var(--charcoal);word-break:break-all;}
.checkbox-row{display:flex;align-items:flex-start;gap:10px;}
.checkbox-row input{margin-top:3px;}
.checkbox-row label{font-size:13px;color:var(--muted);font-weight:400;}
.form-error{background:var(--danger-bg);color:var(--danger-tx);padding:12px 14px;border-radius:8px;font-size:13.5px;margin-bottom:18px;}
.chip-info{display:inline-flex;gap:8px;align-items:center;background:var(--cream);border:1px solid var(--line);padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;color:var(--ink-deep);margin-bottom:24px;}

.success-card{max-width:560px;margin:0 auto;text-align:center;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:44px 32px;box-shadow:var(--shadow);}
.success-icon{width:60px;height:60px;border-radius:50%;background:var(--success-bg);color:var(--success-tx);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
.success-icon svg{width:30px;height:30px;}
.ref-code{font-family:'Fraunces',serif;font-size:24px;font-weight:600;color:var(--ink-deep);background:var(--cream);padding:12px 20px;border-radius:10px;margin:18px 0;letter-spacing:0.02em;}

/* admin */
.admin-login-wrap{max-width:400px;margin:60px auto;}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px;}
.stat-card{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:16px;}
.stat-card .num{font-family:'Fraunces',serif;font-size:26px;color:var(--ink-deep);font-weight:600;}
.stat-card .lbl{font-size:12px;color:var(--muted);}
.tabs{display:flex;gap:6px;margin-bottom:22px;border-bottom:1px solid var(--line);}
.tab-btn{padding:11px 18px;font-size:14px;font-weight:700;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;}
.tab-btn.active{color:var(--ink-deep);border-color:var(--pomegranate);}
.filter-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center;}
.filter-btn{padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:12.5px;font-weight:700;color:var(--muted);}
.filter-btn.active{background:var(--ink);border-color:var(--ink);color:#fff;}
.search-input{max-width:260px;}
table.app-table{width:100%;border-collapse:collapse;background:var(--paper);border-radius:10px;overflow:hidden;border:1px solid var(--line);}
table.app-table th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:0.04em;color:var(--muted);padding:12px 14px;border-bottom:1px solid var(--line);background:var(--cream);}
table.app-table td{padding:13px 14px;border-bottom:1px solid var(--line);font-size:13.5px;}
table.app-table tr:last-child td{border-bottom:none;}
table.app-table tr.row-clickable{cursor:pointer;}
table.app-table tr.row-clickable:hover{background:var(--cream);}
.status-badge{display:inline-block;padding:4px 11px;border-radius:999px;font-size:11.5px;font-weight:700;}
.status-badge.yangi{background:var(--new-bg);color:var(--new-tx);}
.status-badge.korib_chiqilmoqda{background:var(--warn-bg);color:var(--warn-tx);}
.status-badge.qabul_qilindi{background:var(--success-bg);color:var(--success-tx);}
.status-badge.rad_etildi{background:var(--danger-bg);color:var(--danger-tx);}

.modal-overlay{position:fixed;inset:0;background:rgba(21,42,68,0.55);display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow:auto;z-index:100;}
.modal-card{background:#fff;border-radius:14px;max-width:640px;width:100%;padding:0;box-shadow:0 20px 50px rgba(0,0,0,0.25);}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--line);}
.modal-head h3{margin:0;font-size:18px;color:var(--ink-deep);}
.modal-close{background:none;border:none;font-size:20px;color:var(--muted);padding:4px 8px;}
.modal-body{padding:24px;max-height:70vh;overflow:auto;}
.detail-row{display:flex;justify-content:space-between;gap:16px;padding:10px 0;border-bottom:1px solid var(--line);font-size:13.5px;}
.detail-row:last-child{border-bottom:none;}
.detail-row .k{color:var(--muted);}
.detail-row .v{font-weight:600;text-align:right;}
.doc-preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0;}
.doc-box{border:1px solid var(--line);border-radius:10px;padding:10px;text-align:center;}
.doc-box img{width:100%;height:140px;object-fit:cover;border-radius:6px;margin-bottom:8px;}
.doc-box .doc-label{font-size:11.5px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:8px;}
.status-actions{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0;}
.status-actions button{flex:1;min-width:130px;}

.news-admin-item{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;padding:16px;background:var(--paper);border:1px solid var(--line);border-radius:10px;margin-bottom:10px;}
.news-admin-item h4{margin:0 0 4px;font-size:15px;}
.news-admin-item p{margin:0;font-size:13px;color:var(--muted);}

.toast{position:fixed;bottom:24px;right:24px;background:var(--ink-deep);color:#fff;padding:14px 20px;border-radius:10px;font-size:13.5px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,0.2);max-width:320px;}

@media (max-width:720px){
  .hero h1{font-size:32px;}
  .nav-links{display:none;}
  .field-row{grid-template-columns:1fr;}
  .doc-preview-grid{grid-template-columns:1fr;}
  footer .wrap{flex-direction:column;}
  .status-box{flex-direction:column;align-items:stretch;}
}
</style>
</head>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <pattern id="ikatMotif" width="40" height="24" patternUnits="userSpaceOnUse">
      <rect width="40" height="24" fill="#1F3A5F"/>
      <polygon points="0,12 10,0 20,12 10,24" fill="#D9A441"/>
      <polygon points="20,12 30,0 40,12 30,24" fill="#B23A2E"/>
      <polygon points="10,12 20,0 30,12 20,24" fill="#3E7C6B" fill-opacity="0.9"/>
    </pattern>

<div id="app"></div>

<script>
/* ---------------- data ---------------- */
const DIRECTIONS = [
  {id:'hotel9', level:9, title:"Mehmonxona menejeri", mode:"Kunduzgi", icon:"hotel"},
  {id:'chef9', level:9, title:"Oshpaz", mode:"Kunduzgi", icon:"chef"},
  {id:'plumb9', level:9, title:"Turar joy infratuzilmasi servisi (Santexnik)", mode:"Kunduzgi", icon:"plumb"},
  {id:'restaurant9', level:9, title:"Restoran va ovqatlanish xizmatlari servisi", mode:"Kunduzgi va Dual", icon:"restaurant"},
  {id:'jewelry9', level:9, title:"Zargarlik", mode:"Kunduzgi", icon:"jewelry"},
  {id:'it9', level:9, title:"Kompyuter tarmoqlari va IT-servis", mode:"Kunduzgi va Dual", icon:"it"},
  {id:'hotel11', level:11, title:"Mehmonxona menejeri", mode:"Kunduzgi va Dual", icon:"hotel"},
  {id:'tourism11', level:11, title:"Turizm", mode:"Kunduzgi", icon:"tourism"},
  {id:'drone11', level:11, title:"Uchuvchisiz uchish qurilmalarini ekspluatatsiya qilish va boshqarish", mode:"Dual", icon:"drone"},
];
/* ============================================================
   MUHIM: Google Apps Script Web App manzilini shu yerga qo'ying.
   Qo'llanma uchun ilova qilingan Code.gs faylidagi izohlarni o'qing.
   ============================================================ */
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzbX8oLQEK_3yuaV3QNWlLduUmLVQMRmDkPfrG5EHjdAzZp_Ozcb6pyLFDCDtTTciZ3Rw/exec";
function isBackendConfigured(){
  return APPS_SCRIPT_URL && APPS_SCRIPT_URL.indexOf('PASTE_YOUR') === -1;
}
async function apiGet(params){
  if(!isBackendConfigured()) return {error:'not_configured'};
  try{
    const url = new URL(APPS_SCRIPT_URL);
    Object.keys(params).forEach(k=>url.searchParams.set(k, params[k]));
    const res = await fetch(url.toString());
    const text = await res.text();
    try{ return JSON.parse(text); }
    catch(parseErr){ return {error:'bad_response', detail:text.slice(0,300), status:res.status}; }
  }catch(e){ return {error:'network', detail:String(e)}; }
}
/* Katta ma'lumot (fayllar) yuborish uchun: yashirin HTML forma orqali,
   iframe'ga target qilib yuboriladi — bu usul brauzerning CORS
   tekshiruvidan chetlab o'tadi (chunki bu oddiy forma navigatsiyasi,
   fetch() emas). Javobni o'qib bo'lmaydi, shuning uchun faqat
   "yuborildi" deb hisoblaymiz va keyin GET orqali tasdiqlaymiz.*/
function submitViaHiddenForm(actionName, payloadObj){
  return new Promise((resolve)=>{
    const frameName = 'hiddenPostFrame_' + Date.now() + '_' + Math.floor(Math.random()*10000);
    const iframe = document.createElement('iframe');
    iframe.name = frameName;
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    const form = document.createElement('form');
    form.method = 'POST';
    form.action = APPS_SCRIPT_URL;
    form.target = frameName;
    form.style.display = 'none';
    form.enctype = 'application/x-www-form-urlencoded';

    const actionField = document.createElement('input');
    actionField.name = 'action';
    actionField.value = actionName;
    form.appendChild(actionField);

    const payloadField = document.createElement('input');
    payloadField.name = 'payload';
    payloadField.value = JSON.stringify(payloadObj);
    form.appendChild(payloadField);

    document.body.appendChild(form);
    form.submit();

    setTimeout(()=>{
      form.remove();
      iframe.remove();
      resolve(true);
    }, 1800);

function esc(s){ return (s===undefined||s===null?'':s+'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(ts){ try{ return new Date(ts).toLocaleString('uz-UZ', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}catch(e){return '';} }
function genId(){ return 'MRG-' + Date.now().toString(36).toUpperCase() + '-' + Math.floor(Math.random()*900+100); }
function q(sel){ return document.querySelector(sel); }
function ikatStrip(tall){ return `<svg class="ikat-strip${tall?' tall':''}" viewBox="0 0 400 24" preserveAspectRatio="none"><rect width="400" height="24" fill="url(#ikatMotif)"/></svg>`; }
function toast(msg){
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 3200);
}

/* ---------------- backend loaders ---------------- */
async function loadApplications(){
  if(!isBackendConfigured()){ state.apps = []; state.appsLoaded = true; return; }
  const r = await apiGet({action:'listApplications', token: state.adminToken || ''});
  state.apps = (r && r.applications) ? r.applications : [];
  state.appsLoaded = true;
}
async function loadNews(){
  if(!isBackendConfigured()){ state.news = []; state.newsLoaded = true; return; }
  const r = await apiGet({action:'listNews'});
  state.news = (r && r.news) ? r.news : [];
  state.newsLoaded = true;
}

/* ---------------- file handling ---------------- */
function readFileAsDataURL(file){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload = ()=>resolve(r.result);
    r.onerror = ()=>reject(new Error('read failed'));
    r.readAsDataURL(file);
  });
}
function loadImage(src){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    img.onload = ()=>resolve(img);
    img.onerror = ()=>reject(new Error('image load failed'));
    img.src = src;
  });
}
async function compressImage(dataUrl, maxWidth, quality){
  try{
    const img = await loadImage(dataUrl);
    const scale = Math.min(1, maxWidth / img.width);
    const w = Math.round(img.width * scale);
    const h = Math.round(img.height * scale);
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    return canvas.toDataURL('image/jpeg', quality);
  }catch(e){
    return dataUrl;
  }
}

const DOC_ROLES = {
  doc: {dataKey:'docData', nameKey:'docName', mimeKey:'docMime', previewId:'docPreview'},
  parentDoc: {dataKey:'parentDocData', nameKey:'parentDocName', mimeKey:'parentDocMime', previewId:'parentDocPreview'},
  certDoc: {dataKey:'certDocData', nameKey:'certDocName', mimeKey:'certDocMime', previewId:'certDocPreview'},
};
async function handleFileChange(inputEl){
  const role = inputEl.getAttribute('data-file-role');
  const file = inputEl.files && inputEl.files[0];
  if(!file) return;
  const isImage = file.type.startsWith('image/');
  if(DOC_ROLES[role]){
    const cfg = DOC_ROLES[role];
    if(!isImage && file.type!=='application/pdf'){
      toast("Faqat rasm yoki PDF fayl yuklashingiz mumkin.");
      inputEl.value='';
      return;
    }
    if(file.size > 8*1024*1024){
      toast("Fayl hajmi juda katta. Iltimos 8MB dan kichik fayl tanlang.");
      inputEl.value='';
      return;
    }
    let dataUrl = await readFileAsDataURL(file);
    if(isImage){ dataUrl = await compressImage(dataUrl, 1100, 0.8); }
    formFiles[cfg.dataKey] = dataUrl;
    formFiles[cfg.nameKey] = file.name;
    formFiles[cfg.mimeKey] = isImage ? 'image/jpeg' : 'application/pdf';
    const prev = document.getElementById(cfg.previewId);
    if(prev){
      prev.innerHTML = `<div class="upload-preview">${isImage?`<img src="${dataUrl}">`:'<div style="width:64px;height:64px;border-radius:8px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;">PDF</div>'}<div class="fname">${esc(file.name)}</div></div>`;
    }
  } else if(role==='photo'){
    if(!isImage){
      toast("Iltimos rasm fayl tanlang.");
      inputEl.value='';
      return;
    }
    if(file.size > 8*1024*1024){
      toast("Rasm hajmi juda katta. Iltimos 8MB dan kichik rasm tanlang.");
      inputEl.value='';
      return;
    }
    let dataUrl = await readFileAsDataURL(file);
    dataUrl = await compressImage(dataUrl, 480, 0.82);
    formFiles.photoData = dataUrl;
    const prev = document.getElementById('photoPreview');
    prev.innerHTML = `<div class="upload-preview"><img src="${dataUrl}"><div class="fname">${esc(file.name)}</div></div>`;
  }
}

  if(!formFiles.parentDocData) errors.push("Ota, ona yoki vasiy pasporti nusxasini yuklang.");
  if(!formFiles.certDocData) errors.push("9-sinfni bitirganlik to'g'risidagi shahodatnomani (yoki attestatni) yuklang.");
  if(!formFiles.photoData) errors.push("3:4 rasmni yuklang.");
  if(!consent) errors.push("Shaxsiy ma'lumotlarni qayta ishlashga rozilik berishingiz kerak.");

  if(errors.length){
    errEl.innerHTML = `<div class="form-error">${errors.map(esc).join('<br>')}</div>`;
    errEl.scrollIntoView({behavior:'smooth', block:'center'});
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Yuborilmoqda...';

  const dir = DIRECTIONS.find(d=>d.id===state.selectedDirection);
  const modeEl = document.getElementById('fMode');
  const chosenMode = modeEl ? modeEl.value : dir.mode;
  const id = genId();
  const data = {
    id,
    direction: dir.title, level: dir.level, mode: chosenMode,
    fullName, birthDate, phone, docType,
    docData: formFiles.docData, docName: formFiles.docName, docMime: formFiles.docMime,
    parentName,
    parentDocData: formFiles.parentDocData, parentDocName: formFiles.parentDocName, parentDocMime: formFiles.parentDocMime,
    certDocData: formFiles.certDocData, certDocName: formFiles.certDocName, certDocMime: formFiles.certDocMime,
    photoData: formFiles.photoData,
  };
  await submitViaHiddenForm('submitApplication', data);

  btn.textContent = 'Tasdiqlanmoqda...';
  let confirmed = false;
  for(let i=0;i<6;i++){
    await new Promise(res=>setTimeout(res, 1500));
    const r = await apiGet({action:'checkStatus', id});
    if(r && r.application){ confirmed = true; break; }
  }
  if(!confirmed){
    btn.disabled = false;
    btn.textContent = 'Arizani yuborish';
    errEl.innerHTML = `<div class="form-error">Ariza yuborildi, lekin tasdiqlashning imkoni bo'lmadi. Bir necha soniyadan so'ng "Ariza holatini tekshirish" bo'limida ${esc(id)} raqami bilan tekshirib ko'ring — agar topilsa, ariza qabul qilingan.</div>`;
    errEl.scrollIntoView({behavior:'smooth', block:'center'});
    return;
  }
  state.appsLoaded = false;
  state.lastRef = id;
  state.view = 'success';
  renderApp();
}

async function checkStatus(){
  const input = document.getElementById('statusIdInput');
  const resultEl = document.getElementById('statusResult');
  const id = input.value.trim();
  if(!id){ resultEl.innerHTML = `<div class="status-result">Iltimos ariza raqamini kiriting.</div>`; return; }
  resultEl.innerHTML = `<div class="status-result">Tekshirilmoqda...</div>`;
  const r = await apiGet({action:'checkStatus', id});
  const a = r && r.application;
  if(!a){
    resultEl.innerHTML = `<div class="status-result">Bunday ariza topilmadi. Ariza raqamini tekshirib qaytadan urinib ko'ring.</div>`;
    return;
  }
  resultEl.innerHTML = `<div class="status-result"><b>${esc(a.fullName)}</b> — ${esc(a.direction)}<br>Holat: <span class="status-badge ${a.status}">${esc(STATUS_LABELS[a.status]||a.status)}</span>${a.adminNote?`<br>Izoh: ${esc(a.adminNote)}`:''}</div>`;
}

async function adminLogin(){
  const user = document.getElementById('adminUser').value.trim();
  const pass = document.getElementById('adminPass').value;
  if(!isBackendConfigured()){
    state.adminError = "Sayt hali backendga ulanmagan (APPS_SCRIPT_URL sozlanmagan).";
    renderApp();
    return;
  }
  const btn = document.querySelector('[data-action="admin-login"]');
  if(btn){ btn.disabled = true; btn.textContent = 'Tekshirilmoqda...'; }
  const r = await apiGet({action:'adminLogin', username:user, password:pass});
  if(r && r.success){
    state.isAdmin = true;
    state.adminToken = r.token;
    state.adminError = null;
    state.appsLoaded = false;
    state.newsLoaded = false;
    renderApp();
  } else {
    const detail = r ? (r.detail || r.error) : '';
    if(detail && detail !== 'unauthorized' && r.success !== false){
      state.adminError = `Ulanishda xatolik. Texnik tafsilot: ${detail}`;
    } else {
      state.adminError = "Login yoki parol noto'g'ri.";
    }
    renderApp();
  }
}
async function setAppStatus(id, status){
  const idx = state.apps.findIndex(a=>a.id===id);
  if(idx<0) return;
  state.apps[idx].status = status;
  await apiGet({action:'updateStatus', token: state.adminToken, id, status});
  toast('Holat yangilandi.');
  renderApp();
}
async function saveNote(id){
  const idx = state.apps.findIndex(a=>a.id===id);
  if(idx<0) return;
  const val = document.getElementById('adminNoteText').value;
  state.apps[idx].adminNote = val;
  await apiGet({action:'updateStatus', token: state.adminToken, id, adminNote: val});
  toast('Izoh saqlandi.');
}
async function addNews(){
  const title = document.getElementById('newsTitle').value.trim();
  const body = document.getElementById('newsBody').value.trim();
  if(!title || !body){ toast("Sarlavha va matnni to'ldiring."); return; }
  await apiGet({action:'addNews', token: state.adminToken, title, body});
  state.newsLoaded = false;
  await loadNews();
  renderAdminContent();
  toast("E'lon chop etildi.");
}
async function deleteNews(id){
  await apiGet({action:'deleteNews', token: state.adminToken, id});
  state.news = state.news.filter(n=>n.id!==id);
  renderAdminContent();
  toast("E'lon o'chirildi.");
}

/* ---------------- event delegation ---------------- */
document.addEventListener('click', async (e)=>{
  const t = e.target.closest('[data-action]');
  if(!t) return;
  const action = t.getAttribute('data-action');
  if(action==='go-home'){ state.view='home'; state.openAppId=null; renderApp(); window.scrollTo({top:0}); }
  else if(action==='go-home-anchor'){
    e.preventDefault();
    const anchor = t.getAttribute('data-anchor');
    if(state.view!=='home'){ state.view='home'; renderApp(); setTimeout(()=>{ const el=document.getElementById(anchor); if(el) el.scrollIntoView({behavior:'smooth'});}, 60); }
    else { const el=document.getElementById(anchor); if(el) el.scrollIntoView({behavior:'smooth'}); }
  }
  else if(action==='apply'){ state.selectedDirection = t.getAttribute('data-dir'); state.view='apply'; renderApp(); window.scrollTo({top:0}); }
  else if(action==='submit-app'){ submitApplication(); }
  else if(action==='check-status'){ checkStatus(); }
  else if(action==='go-admin'){ e.preventDefault(); state.view='admin'; state.adminError=null; renderApp(); window.scrollTo({top:0}); }
  else if(action==='admin-login'){ adminLogin(); }
  else if(action==='admin-logout'){ state.isAdmin=false; state.adminToken=null; state.view='home'; renderApp(); }
  else if(action==='admin-tab'){ state.adminTab = t.getAttribute('data-tab'); renderApp(); }
  else if(action==='admin-filter'){ state.filterStatus = t.getAttribute('data-status'); renderAdminContent(); }
  else if(action==='open-app'){ state.openAppId = t.getAttribute('data-id'); renderApp(); }
  else if(action==='close-modal'){
    if(t.classList.contains('modal-overlay') && e.target !== t){
      /* click bubbled from inside the card interior — ignore */
    } else {
      closeModal();
    }
  }
  else if(action==='set-status'){ setAppStatus(t.getAttribute('data-id'), t.getAttribute('data-status')); }
  else if(action==='save-note'){ saveNote(t.getAttribute('data-id')); }
  else if(action==='add-news'){ addNews(); }
  else if(action==='delete-news'){ deleteNews(t.getAttribute('data-id')); }
});
document.addEventListener('change', (e)=>{
  if(e.target.matches('[data-file-input], input[type=file][data-file-role]')){
    handleFileChange(e.target);
  }
});
document.addEventListener('keydown', (e)=>{
  if(e.key==='Enter' && e.target && e.target.id==='statusIdInput'){ checkStatus(); }
  if(e.key==='Enter' && e.target && (e.target.id==='adminUser' || e.target.id==='adminPass')){ adminLogin(); }
});
document.addEventListener('input', (e)=>{
  if(e.target && e.target.id==='adminSearch'){
    state.searchQuery = e.target.value;
    renderAdminContent();
  }
});

/* ---------------- init ---------------- */
renderApp();
</script>
